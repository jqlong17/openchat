openapi: 3.0.3
info:
  title: OpenChat API
  version: 0.1.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: http://127.0.0.1:8080
    description: Local (default PORT)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: 阶段 1 起用于用户 API（占位）

paths:
  /api/v1/health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    example: ok
